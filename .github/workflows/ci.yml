name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  # Supersede in-flight runs for the same branch; the newest commit is the
  # only one whose result matters.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: tests (python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.9 is the floor declared in pyproject.toml.
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e '.[dev]'

      - name: Run tests
        # The suite includes an end-to-end test that binds real UDP and
        # WebSocket ports on localhost.
        run: pytest -v

  docker:
    name: docker image + smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: mavlink-foxglove:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: |
          docker run -d --name bridge \
            -p 127.0.0.1:14445:14445/udp \
            -p 127.0.0.1:8765:8765 \
            mavlink-foxglove:ci
          # Wait for the WebSocket port instead of sleeping a fixed amount.
          for _ in $(seq 30); do
            if python -c "import socket;socket.create_connection(('127.0.0.1',8765),1)" 2>/dev/null; then
              echo "bridge is listening"; exit 0
            fi
            sleep 1
          done
          echo "bridge failed to start"; docker logs bridge; exit 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install smoke-test dependencies
        run: pip install -e '.[dev]'

      - name: Smoke test the running container
        # Drives the container over real UDP and WebSocket, validating live
        # payloads against the schemas it advertises.
        run: python tools/smoke_test.py

      - name: Assert the container logged no errors
        run: |
          if docker logs bridge 2>&1 | grep -iE 'traceback|exception|error'; then
            echo "::error::bridge logged errors during the smoke test"
            exit 1
          fi
          echo "no errors logged"

      - name: Container logs
        if: always()
        run: docker logs bridge
